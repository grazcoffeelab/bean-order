<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>원두 발주 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
.header{background:#fff;border-bottom:1px solid #e8e8e8;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:16px;font-weight:500}.logo span{color:#7F77DD}
.ubadge{font-size:12px;padding:4px 10px;border-radius:8px;background:#e6f1fb;color:#185FA5;cursor:pointer;border:1px solid #b5d4f4}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;padding:0 20px;overflow-x:auto;position:sticky;top:49px;z-index:9}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{color:#7F77DD;border-bottom-color:#7F77DD;font-weight:500}
.content{padding:16px 20px;max-width:800px;margin:0 auto}
.stitle{font-size:13px;color:#888;margin-bottom:10px;font-weight:500}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.badge{font-size:11px;padding:2px 8px;border-radius:8px;display:inline-block;white-space:nowrap}
.bc{background:#EEEDFE;color:#534AB7}.bd{background:#E1F5EE;color:#0F6E56}
.bw{background:#FAEEDA;color:#854F0B}.bs{background:#EAF3DE;color:#3B6D11}
.bhq{background:#E6F1FB;color:#185FA5}.bb2b{background:#FBEAF0;color:#993556}
.bsh{background:#FAECE7;color:#993C1D}.bfr{background:#F1EFE8;color:#5F5E5A}
.bpart{background:#EEEDFE;color:#534AB7}.bcancel{background:#f5f5f3;color:#888}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:500px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:#f5f5f3;border-radius:8px;padding:10px 12px}
.sl{font-size:11px;color:#888;margin-bottom:4px}.sv{font-size:20px;font-weight:500}.ss{font-size:11px;color:#888}
.frow{display:grid;gap:10px;margin-bottom:10px}
.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}.f4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:560px){.f3,.f4{grid-template-columns:1fr 1fr}}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.field select,.field input{width:100%;padding:8px 10px;font-size:13px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.field select:focus,.field input:focus{border-color:#7F77DD}
.btn{padding:8px 18px;font-size:13px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-weight:500}
.btn:hover{background:#f5f5f3}
.btnp{background:#7F77DD;color:#fff;border-color:#534AB7}
.btnp:hover{background:#6c64cc}
.btnp:disabled{background:#b0acee;border-color:#b0acee;cursor:not-allowed}
.btnsm{padding:4px 10px;font-size:12px}
.btnd{background:#fff0f0;color:#a32d2d;border-color:#f7c1c1;font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer}
.btnd:hover{background:#fce4e4}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:#f5f5f3}
.lcard{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:32px 28px;width:100%;max-width:340px}
.rsel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.rbtn{padding:10px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;background:#f5f5f3;color:#888}
.rbtn.on{border-color:#7F77DD;background:#EEEDFE;color:#534AB7;font-weight:500}
.orow{padding:10px 0;border-bottom:1px solid #f0f0f0}.orow:last-child{border-bottom:none}
.orow.cancelled{opacity:0.45;background:#fafafa}
.inv-tag{font-size:11px;padding:2px 7px;background:#e6f1fb;color:#185FA5;border-radius:8px;margin:2px 2px 0 0;display:inline-block}
.inv-tag.cancelled{background:#f0f0f0;color:#999;text-decoration:line-through}
.notice{font-size:12px;color:#888;background:#f5f5f3;padding:8px 12px;border-radius:8px;margin-top:8px}
.divider{height:1px;background:#f0f0f0;margin:12px 0}
.dlist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
@media(max-width:500px){.dlist{grid-template-columns:1fr}}
.ditem{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f5f5f3;border-radius:8px;font-size:13px}
.ddel{font-size:11px;padding:2px 7px;border-radius:8px;cursor:pointer;border:1px solid #f7c1c1;background:#fff0f0;color:#a32d2d}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;padding:8px 10px;font-size:13px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.inv-row{display:grid;grid-template-columns:28px 1fr 28px;gap:8px;align-items:center;margin-bottom:8px}
.inv-num{width:28px;height:28px;border-radius:50%;background:#EEEDFE;color:#534AB7;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inv-row input{padding:7px 10px;font-size:13px;border:1px solid #e0e0e0;border-radius:8px;width:100%;outline:none;background:#fff;color:#1a1a1a}
.inv-row input:focus{border-color:#7F77DD}
.inv-del{width:28px;height:28px;border-radius:50%;border:1px solid #f7c1c1;background:#fff0f0;color:#a32d2d;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lotte{background:#fff0e8;color:#c84b00;font-size:11px;padding:2px 8px;border-radius:8px;display:inline-block}
.logen{background:#e8f0ff;color:#1a4bbd;font-size:11px;padding:2px 8px;border-radius:8px;display:inline-block}
.order-pending{background:#fffbf0;border:1px solid #FAC775;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.order-cancelled{background:#fafafa;border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px;margin-bottom:8px;opacity:0.5}
.prog-bar{height:5px;background:#e8e8e8;border-radius:3px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:#7F77DD}
.cancel-reason{font-size:11px;color:#a32d2d;background:#fff0f0;padding:4px 8px;border-radius:6px;margin-top:4px;display:inline-block}
</style>
</head>
<body>
<div id="loginView">
<div class="login-wrap">
  <div class="lcard">
    <div style="font-size:20px;font-weight:500;margin-bottom:4px">원두 발주 시스템</div>
    <div style="font-size:13px;color:#888;margin-bottom:24px">더블씨 원두 발주 · 송장 관리</div>
    <div style="font-size:12px;color:#888;margin-bottom:8px">계정 선택</div>
    <div class="rsel">
      <div class="rbtn on" id="r-hq" onclick="selRole('hq')">본사</div>
      <div class="rbtn" id="r-dc" onclick="selRole('dc')">더블씨</div>
    </div>
    <div class="field" style="margin-bottom:12px"><label>아이디</label><input type="text" placeholder="아이디 입력"/></div>
    <div class="field" style="margin-bottom:20px"><label>비밀번호</label><input type="password" placeholder="비밀번호 입력"/></div>
    <button class="btn btnp" style="width:100%;padding:10px" onclick="doLogin()">로그인</button>
  </div>
</div>
</div>

<div id="mainView" style="display:none">
  <div class="header">
    <div class="logo"><span>더블씨</span> 원두 발주 시스템</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="sync-status" style="font-size:11px;color:#888"></div>
      <div class="ubadge" id="ubadge" onclick="logout()">로그아웃</div>
    </div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="content" id="mc"></div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycby56brnFkkjibc3G8jo-uie3WF1-F_Pe0fjCyHEoqknfz_Pa3Id3g-W-kxM_J9AylkPow/exec';
var role='hq',selR='hq',invRowIdx=0;
var b2b=['한국비티비','한국비엔씨','러닝체인','구주제약 공장','구주제약 연구소','구주제약 본사','한국 BMI 청계','한국 BMI 제주','그레이스','김다희 (중앙대병원)','세인이엔지','아이진','엘에스이 (경기 용인)','엘에스이 (경기 이천)','한일시멘트','H 컴퍼니','KINX','주식회사 캐리','카스트크리에이티브','대원제약','아이젠코리아 (예정)','메디카코리아 공장 (예정)','메디카코리아 (예정)'];
var fran=['그라츠커피랩 건대점','그라츠커피랩 논현점','그라츠커피랩 문정점','그라츠커피랩 반포점','그라츠커피랩 종로점','그라츠커피랩 동탄 코벤트가든 본점','그라츠커피랩 동탄여울공원점','그라츠커피랩 동탄호수공원점','그라츠커피랩 과천중앙점','그라츠커피랩 분당점','그라츠커피랩 수지성북점','그라츠커피랩 수원조원점','그라츠커피랩 판교파미어스몰점','그라츠커피랩 송도트리플스트리트점','베를린 166','늘포레','카페 마루','처인재 (예정)','고령오펠CC'];
var shortD=[],orders=[],shipments=[];

async function gasGet(t){var r=await fetch(GAS_URL+'?type='+t);return r.json();}
async function gasPost(d){var r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(d)});return r.json();}
function setSync(m,c){var el=document.getElementById('sync-status');if(el){el.textContent=m;el.style.color=c==='ok'?'#3B6D11':c==='err'?'#A32D2D':'#854F0B';}}

function fmtDate(v){if(!v)return'';var s=String(v);if(s.indexOf('T')>-1)s=s.split('T')[0];return s;}

async function loadFromSheet(){
  setSync('불러오는 중...','ing');
  try{
    var res=await Promise.all([gasGet('orders'),gasGet('shipments')]);
    var oR=res[0],sR=res[1];
    if(Array.isArray(oR)&&oR.length>1) orders=oR.slice(1).map(function(r){return{id:r[0],date:fmtDate(r[1]),cat:r[2],dest:r[3],bean:r[4],kg:Number(r[5])||0,g200:Number(r[6])||0,note:r[7]||'',status:r[8]||'',cancelReason:r[9]||''};});
    if(Array.isArray(sR)&&sR.length>1) shipments=sR.slice(1).map(function(r){return{id:r[0],date:fmtDate(r[1]),cat:r[2],dest:r[3],bean:r[4],kg:Number(r[5])||0,g200:Number(r[6])||0,invoice:r[7],carrier:r[8]||'',orderId:r[9]||null,status:r[10]||''};});
    setSync('연동됨 ✓','ok');
  }catch(e){setSync('연결 실패','err');}
}

function catBadge(c){if(c==='본사')return'<span class="badge bhq">본사</span>';if(c==='B2B')return'<span class="badge bb2b">B2B</span>';if(c==='단기')return'<span class="badge bsh">단기</span>';if(c==='가맹')return'<span class="badge bfr">가맹</span>';return c;}
function beanBadge(b){return b==='카페인'?'<span class="badge bc">카페인</span>':'<span class="badge bd">디카페인</span>';}
function carrierTag(c){if(!c)return'';return c==='롯데택배'?'<span class="lotte">'+c+'</span>':'<span class="logen">'+c+'</span>';}
function getCarrier(b){return b==='카페인'?'롯데택배':'로젠택배';}
function getDestsForCat(cat){if(cat==='본사')return['동탄본점','사무실','행사'];if(cat==='가맹')return fran;if(cat==='B2B')return b2b;return[];}
function today(){return new Date().toISOString().slice(0,10);}
function newId(p,arr){return p+'-'+(arr.length+1).toString().padStart(3,'0');}
function shippedKg(oid){return shipments.filter(function(s){return s.orderId===oid&&s.status!=='취소';}).reduce(function(a,b){return a+(b.kg||0);},0);}
function orderStatus(o){
  if(o.status==='취소') return 'cancelled';
  var sk=shippedKg(o.id);
  if(sk<=0)return'pending';
  if(sk>=o.kg)return'done';
  return'partial';
}

function selRole(r){selR=r;document.getElementById('r-hq').className='rbtn'+(r==='hq'?' on':'');document.getElementById('r-dc').className='rbtn'+(r==='dc'?' on':'');}

async function doLogin(){
  role=selR;
  document.getElementById('loginView').style.display='none';
  document.getElementById('mainView').style.display='block';
  document.getElementById('ubadge').textContent=(role==='hq'?'본사':'더블씨')+' · 로그아웃';
  buildTabs();
  var ft=role==='hq'?'order':'invoice';
  showTab(ft);
  await loadFromSheet();
  showTab(ft);
}
function logout(){document.getElementById('loginView').style.display='flex';document.getElementById('mainView').style.display='none';orders=[];shipments=[];}

var HQ_TABS=[{id:'order',label:'발주 요청'},{id:'track',label:'출고 현황'},{id:'monthly',label:'월별 집계'},{id:'checkinv',label:'송장 확인'},{id:'dests',label:'납품처 관리'}];
var DC_TABS=[{id:'invoice',label:'송장 입력'},{id:'track',label:'출고 현황'},{id:'dests',label:'납품처 관리'}];

function buildTabs(){
  var tabs=role==='hq'?HQ_TABS:DC_TABS;
  document.getElementById('tabBar').innerHTML=tabs.map(function(t){return'<div class="tab" id="tab-'+t.id+'" onclick="showTab(\''+t.id+'\')">'+t.label+'</div>';}).join('');
}
function showTab(t){
  var tabs=role==='hq'?HQ_TABS:DC_TABS;
  tabs.forEach(function(tb){var el=document.getElementById('tab-'+tb.id);if(el)el.className='tab'+(tb.id===t?' active':'');});
  var c=document.getElementById('mc');
  if(t==='order')renderOrder(c);
  else if(t==='track')renderTrack(c);
  else if(t==='monthly')renderMonthly(c);
  else if(t==='checkinv')renderCheckInv(c);
  else if(t==='invoice')renderDCInvoice(c);
  else if(t==='dests')renderDests(c);
}

// ── 취소 함수 ──
async function cancelOrder(oid){
  var reason=prompt('취소 사유를 입력하세요 (선택)');
  if(reason===null)return;
  if(!confirm('발주 '+oid+'를 취소할까요?'))return;
  try{
    var res=await gasPost({action:'cancelOrder',id:oid,reason:reason,user:role==='hq'?'본사':'더블씨'});
    if(res.ok){
      var o=orders.find(function(x){return x.id===oid;});
      if(o){o.status='취소';o.cancelReason=reason;}
      setSync('취소 처리됨','ok');
      showTab(role==='hq'?'order':'invoice');
    } else throw new Error(res.error);
  }catch(e){alert('취소 실패: '+e.message);}
}

async function cancelShipment(sid){
  var reason=prompt('취소 사유를 입력하세요 (선택)');
  if(reason===null)return;
  if(!confirm('송장 '+sid+'를 취소할까요?'))return;
  try{
    var res=await gasPost({action:'cancelShipment',id:sid,reason:reason,user:role==='hq'?'본사':'더블씨'});
    if(res.ok){
      var s=shipments.find(function(x){return x.id===sid;});
      if(s)s.status='취소';
      setSync('취소 처리됨','ok');
      showTab('track');
    } else throw new Error(res.error);
  }catch(e){alert('취소 실패: '+e.message);}
}

// ── 본사: 발주 요청 ──
function renderOrder(c){
  var activeOrders=orders.filter(function(o){return o.status!=='취소';});
  var cancelledOrders=orders.filter(function(o){return o.status==='취소';});
  var html='<div class="stitle">발주 요청</div><div class="card">'
  +'<div class="frow f3">'
  +'<div class="field"><label>카테고리</label><select id="f-cat" onchange="updDest()"><option>본사</option><option>B2B</option><option>단기</option></select></div>'
  +'<div class="field"><label>납품처</label><select id="f-dest"></select></div>'
  +'<div class="field"><label>원두 구분</label><select id="f-bean"><option>카페인</option><option>디카페인</option></select></div>'
  +'</div>'
  +'<div class="frow f3">'
  +'<div class="field"><label>1kg 수량</label><input type="number" id="f-kg" placeholder="개" min="0" step="1"/></div>'
  +'<div class="field"><label>200g 수량</label><input type="number" id="f-g200" placeholder="개" min="0" step="1"/></div>'
  +'<div class="field"><label>요청 날짜</label><input type="date" id="f-date" value="'+today()+'"/></div>'
  +'</div>'
  +'<div class="field" id="f-cw" style="display:none;margin-bottom:10px"><label>납품처 직접 입력</label><input type="text" id="f-custom" placeholder="납품처명 입력"/></div>'
  +'<div class="field" style="margin-bottom:14px"><label>비고</label><input type="text" id="f-note" placeholder="특이사항 (선택)"/></div>'
  +'<div style="display:flex;justify-content:flex-end;gap:8px">'
  +'<button class="btn" onclick="resetOrderForm()">초기화</button>'
  +'<button class="btn btnp" id="submit-btn" onclick="submitOrder()">발주 요청 전송 ↗</button>'
  +'</div>'
  +'<div class="notice">발주 요청 시 구글 스프레드시트에 자동 기록됩니다</div>'
  +'</div><div id="sresult"></div>';

  if(activeOrders.length>0){
    html+='<div class="stitle" style="margin-top:4px">진행 중인 발주</div><div class="card">';
    activeOrders.forEach(function(o){
      var sk=shippedKg(o.id);
      var st=orderStatus(o);
      var badge=st==='done'?'<span class="badge bs">출고완료</span>':st==='partial'?'<span class="badge bpart">부분출고</span>':'<span class="badge bw">출고대기</span>';
      html+='<div class="orow"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:500">'+o.dest+' '+catBadge(o.cat)+' '+beanBadge(o.bean)+'</div>'
      +'<div style="font-size:11px;color:#888;margin-top:2px">'+o.id+' · '+o.date+(o.kg?' · 1kg×'+o.kg+'개':'')+(o.g200?' · 200g×'+o.g200+'개':'')+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:6px">'+badge
      +(st!=='done'?'<button class="btnd" onclick="cancelOrder(\''+o.id+'\')">취소</button>':'')
      +'</div></div></div>';
    });
    html+='</div>';
  }

  if(cancelledOrders.length>0){
    html+='<div class="stitle" style="margin-top:4px">취소된 발주</div><div class="card">';
    cancelledOrders.forEach(function(o){
      html+='<div class="orow cancelled"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:500;text-decoration:line-through;color:#999">'+o.dest+' '+catBadge(o.cat)+' '+beanBadge(o.bean)+'</div>'

function autoGenInvFor(oid){
  var kg=parseInt(document.getElementById('inv-kg-'+oid).value)||0;
  var count=Math.ceil(kg/10);
  var list=document.getElementById('inv-list-'+oid);if(!list)return;
  var existing=[];list.querySelectorAll('input[data-inv]').forEach(function(el){existing.push(el.value);});
  list.innerHTML='';
  for(var i=0;i<count;i++) addInvRowFor(oid,existing[i]||'');
  var lbl=document.getElementById('inv-count-'+oid);if(lbl)lbl.textContent=count>0?count+'개 자동생성':'';
}
function addInvRowFor(oid,val){
  var list=document.getElementById('inv-list-'+oid);if(!list)return;
  var idx=list.children.length+1;
  var rowId='invr-'+oid+'-'+Date.now()+'-'+idx;
  var div=document.createElement('div');div.className='inv-row';div.id=rowId;
  div.innerHTML='<div class="inv-num">'+idx+'</div><input type="text" data-inv="1" placeholder="송장번호" value="'+(val||'')+'"/><div class="inv-del" onclick="delInvRowX(\''+rowId+'\',\'inv-list-'+oid+'\')">×</div>';
  list.appendChild(div);reIdxInvList('inv-list-'+oid);
}
function delInvRowX(rowId,listId){var el=document.getElementById(rowId);if(el)el.remove();reIdxInvList(listId);}
function reIdxInvList(listId){
  var list=document.getElementById(listId);if(!list)return;
  list.querySelectorAll('.inv-row').forEach(function(r,i){var n=r.querySelector('.inv-num');if(n)n.textContent=i+1;});
}
function getInvoicesFrom(listId){
  var vals=[];
  var list=document.getElementById(listId);if(!list)return vals;
  list.querySelectorAll('input[data-inv]').forEach(function(el){if(el.value.trim())vals.push(el.value.trim());});
  return vals;
}
async function submitInvoiceFor(oid){
  var o=orders.find(function(x){return x.id===oid;});if(!o)return;
  var kg=parseInt(document.getElementById('inv-kg-'+oid).value)||0;
  var g200=parseInt(document.getElementById('inv-g200-'+oid).value)||0;
  var date=document.getElementById('inv-date-'+oid).value;

  var btn=document.getElementById('inv-btn-'+oid);btn.textContent='저장 중...';btn.disabled=true;

    for(var i=0;i<invoices.length;i++){
      var id=newId('SHP',shipments);

      var res=await gasPost({action:'addShipment',id:id,date:date,cat:o.cat,dest:o.dest,bean:o.bean,kg:rKg,g200:rG,invoice:invoices[i],carrier:carrier,orderId:oid,user:'더블씨'});

        }).join('')+'</div>':'')
      +'</div>';
    });
  }
  html+='</div>';
  c.innerHTML=html;
}

// ── 월별 집계 ──
function renderMonthly(c){
  var cats=['본사','B2B','단기','가맹'];
  var month=today().slice(0,7);
  var ms=shipments.filter(function(s){return s.date&&s.date.slice(0,7)===month&&s.status!=='취소';});
  var html='<div class="stitle">'+month+' · 카테고리별 원두 소진량</div><div class="card">'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">';
  cats.forEach(function(cat){
    var items=ms.filter(function(s){return s.cat===cat;});
    var c1=items.filter(function(s){return s.bean==='카페인';}).reduce(function(a,b){return a+(b.kg||0);},0);
    var c2=items.filter(function(s){return s.bean==='카페인';}).reduce(function(a,b){return a+(b.g200||0);},0);
    var d1=items.filter(function(s){return s.bean==='디카페인';}).reduce(function(a,b){return a+(b.kg||0);},0);
    var d2=items.filter(function(s){return s.bean==='디카페인';}).reduce(function(a,b){return a+(b.g200||0);},0);
    var has=c1||c2||d1||d2;
    html+='<div style="padding:12px;background:#f5f5f3;border-radius:8px"><div style="margin-bottom:8px">'+catBadge(cat)+'</div>';
    if(has){
      if(c1||c2) html+='<div style="font-size:11px;font-weight:500;color:#534AB7;margin-bottom:3px">카페인</div>'+(c1?'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:1px"><span style="color:#888">1kg</span><span>'+c1+'개</span></div>':'')+(c2?'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:#888">200g</span><span>'+c2+'개</span></div>':'');
      if(d1||d2) html+='<div style="font-size:11px;font-weight:500;color:#0F6E56;margin-bottom:3px">디카페인</div>'+(d1?'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:1px"><span style="color:#888">1kg</span><span>'+d1+'개</span></div>':'')+(d2?'<div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#888">200g</span><span>'+d2+'개</span></div>':'');
    } else {
      html+='<div style="font-size:12px;color:#888">출고 내역 없음</div>';
    }
    html+='</div>';
  });
  html+='</div><div class="divider"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">';
  [['카페인 1kg','카페인','kg'],['카페인 200g','카페인','g200'],['디카페인 1kg','디카페인','kg'],['디카페인 200g','디카페인','g200']].forEach(function(x){
    var val=ms.filter(function(s){return s.bean===x[1];}).reduce(function(a,b){return a+(b[x[2]]||0);},0);
    html+='<div style="text-align:center;padding:8px;background:#f5f5f3;border-radius:8px"><div style="font-size:11px;color:#888;margin-bottom:2px">'+x[0]+'</div><div style="font-size:16px;font-weight:500">'+val+'개</div></div>';
  });
  html+='</div></div><div class="notice">취소 건은 집계에서 제외됩니다</div>';
  c.innerHTML=html;
}

// ── 본사: 송장 확인 ──
function renderCheckInv(c){
  var recent=shipments.slice().reverse().slice(0,20);
  var html='<div class="stitle">송장 확인 — 최근 출고 내역</div><div class="card">';
  if(recent.length===0){
    html+='<div style="text-align:center;padding:24px;color:#888;font-size:13px">출고 내역이 없습니다</div>';
  } else {
    recent.forEach(function(s){
      html+='<div class="orow'+(s.status==='취소'?' cancelled':'')+'">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">'
      +'<div>'
      +'<div style="font-size:13px;font-weight:500'+(s.status==='취소'?';text-decoration:line-through;color:#999':'')+'">'
      +s.dest+' '+catBadge(s.cat)+' '+beanBadge(s.bean)+'</div>'
      +'<div style="font-size:11px;color:#888;margin-top:2px">'+s.date+(s.kg?' · 1kg×'+s.kg+'개':'')+(s.g200?' · 200g×'+s.g200+'개':'')+' · '+carrierTag(s.carrier)+'</div>'
      +'<span class="inv-tag'+(s.status==='취소'?' cancelled':'')+'" style="margin-top:3px">'+(s.status==='취소'?'[취소] ':'')+s.invoice+'</span>'
      +'</div>'
      +(s.status==='취소'?'<span class="badge bcancel">취소</span>':'<span class="badge bs">출고완료</span>')
      +'</div></div>';
    });
  }
  html+='</div><div class="notice">더블씨가 등록한 송장번호 · 출고날짜가 여기에 표시됩니다</div>';
  c.innerHTML=html;
}

// ── 납품처 관리 ──
function renderDests(c){
  var html='<div class="stitle">납품처 관리</div>'
  +'<div class="card" style="margin-bottom:10px">'
  +'<div style="font-size:13px;font-weight:500;margin-bottom:8px">B2B <span style="font-size:12px;color:#888;font-weight:400">'+b2b.length+'곳</span></div>'
  +'<div class="dlist">'+b2b.map(function(d,i){return'<div class="ditem"><span style="font-size:12px">'+d+'</span><span class="ddel" onclick="delD(\'b2b\','+i+',\''+d.replace(/'/g,"\\'")+'\')">삭제</span></div>';}).join('')+'</div>'
  +'<div class="add-row"><input type="text" placeholder="납품처 추가" id="add-b2b"/><button class="btn btnp btnsm" onclick="addD(\'b2b\')">+ 추가</button></div></div>'
  +'<div class="card" style="margin-bottom:10px">'
  +'<div style="font-size:13px;font-weight:500;margin-bottom:8px">가맹 / 카페납품 <span style="font-size:12px;color:#888;font-weight:400">'+fran.length+'곳</span></div>'
  +'<div class="dlist">'+fran.map(function(d,i){return'<div class="ditem"><span style="font-size:12px">'+d+'</span><span class="ddel" onclick="delD(\'fran\','+i+',\''+d.replace(/'/g,"\\'")+'\')">삭제</span></div>';}).join('')+'</div>'
  +'<div class="add-row"><input type="text" placeholder="납품처 추가" id="add-fran"/><button class="btn btnp btnsm" onclick="addD(\'fran\')">+ 추가</button></div></div>'
  +'<div class="card">'
  +'<div style="font-size:13px;font-weight:500;margin-bottom:8px">단기 <span style="font-size:12px;color:#888;font-weight:400">'+shortD.length+'곳</span></div>'
  +(shortD.length===0?'<div style="font-size:13px;color:#888;padding:4px 0 8px">등록된 납품처 없음</div>':'')
  +'<div class="dlist">'+shortD.map(function(d,i){return'<div class="ditem"><span style="font-size:12px">'+d+'</span><span class="ddel" onclick="delD(\'short\','+i+',\''+d.replace(/'/g,"\\'")+'\')">삭제</span></div>';}).join('')+'</div>'
  +'<div class="add-row"><input type="text" placeholder="납품처 추가" id="add-short"/><button class="btn btnp btnsm" onclick="addD(\'short\')">+ 추가</button></div></div>';
  c.innerHTML=html;
}
async function addD(type){
  var el=document.getElementById('add-'+type);var v=el.value.trim();if(!v)return;
  var cat=type==='b2b'?'B2B':type==='fran'?'가맹':'단기';
  try{await gasPost({action:'addDest',cat:cat,name:v});if(type==='b2b')b2b.push(v);else if(type==='fran')fran.push(v);else shortD.push(v);el.value='';renderDests(document.getElementById('mc'));}
  catch(e){alert('저장 실패: '+e.message);}
}
async function delD(type,i,name){
  if(!confirm('삭제할까요?'))return;
  var cat=type==='b2b'?'B2B':type==='fran'?'가맹':'단기';
  try{await gasPost({action:'deleteDest',cat:cat,name:name});if(type==='b2b')b2b.splice(i,1);else if(type==='fran')fran.splice(i,1);else shortD.splice(i,1);renderDests(document.getElementById('mc'));}
  catch(e){alert('삭제 실패: '+e.message);}
}
</script>
</body>
</html>
